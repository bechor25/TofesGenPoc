services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tofes
      POSTGRES_PASSWORD: tofes
      POSTGRES_DB: tofes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tofes -d tofes"]
      interval: 5s
      timeout: 3s
      retries: 15
    # expose to the host for debugging (optional)
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # OPENAI_API_KEY (and any model overrides) come from your .env file
    env_file:
      - .env
    environment:
      # explicit -> overrides whatever DATABASE_URL is in .env, so the app talks to
      # the compose Postgres, not a local SQLite file
      DATABASE_URL: postgresql+psycopg://tofes:tofes@db:5432/tofes
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-5.1}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-2}
    ports:
      - "8501:8501"

volumes:
  pgdata:
